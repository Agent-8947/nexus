name: NEXUS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r PROJECT/backend/requirements.txt
        
    - name: Run Backend Tests
      run: |
        # Replace with actual pytest command when tests are implemented
        echo "Placeholder for pytest"
        
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./PROJECT/frontend/nexus-v2
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './PROJECT/frontend/nexus-v2/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Astro Project
      run: npm run build
