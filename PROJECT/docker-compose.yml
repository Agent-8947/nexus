version: '3.8'

services:
  # Postgres with pgvector extension for Local RAG
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nexus_admin
      POSTGRES_PASSWORD: nexus_password
      POSTGRES_DB: nexus_core
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data

  # Upstash Redis local alternative
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nexus_redis_data:/data

  # Deep Graph Memory for NEXUS
  neo4j:
    image: neo4j:5-community
    container_name: nexus_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/nexus_graph_db"
    volumes:
      - nexus_neo4j_data:/data

  # FastAPI Backend Service (Placeholder for production deploy)
  # backend:
  #   build: ./backend
  #   container_name: nexus_api
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - postgres
  #     - redis
  #   env_file:
  #     - .env

volumes:
  nexus_pgdata:
  nexus_redis_data:
  nexus_neo4j_data:
